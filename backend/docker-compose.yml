version: '3.8'

services:
  # PostgreSQL Database
  db:
    image: postgres:15-alpine
    container_name: safehavenconnect-db
    environment:
      POSTGRES_USER: safehaven
      POSTGRES_PASSWORD: safehaven123
      POSTGRES_DB: safehavenconnect
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U safehaven"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Flask Backend API
  backend:
    build: .
    container_name: safehavenconnect-backend
    env_file: .env
    environment:
      DATABASE_URL: postgresql://safehaven:safehaven123@db:5432/safehavenconnect
      FLASK_ENV: production
      SECRET_KEY: dev-secret-key-change-in-production
      PORT: 5000
      PEXELS_API_KEY: ${PEXELS_API_KEY}
    ports:
      - "80:5000"
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - .:/app
    # Use default CMD from Dockerfile (gunicorn)

volumes:
  postgres_data:
