stages:
  - test
  - build
  - deploy

variables:
  NODE_VERSION: "20"

cache:
  paths:
    - node_modules/

test:
  stage: test
  image: node:$NODE_VERSION
  before_script:
    - cd frontend
    - npm ci
  script:
    - npm run lint
    - npm run build
    - cd ..
    - make status
  artifacts:
    paths:
      - frontend/dist/
    expire_in: 1 hour

build:
  stage: build
  image: node:$NODE_VERSION
  before_script:
    - cd frontend
    - npm ci
  script:
    - npm run build
  artifacts:
    paths:
      - frontend/dist/
    expire_in: 1 week
  only:
    - main
    - develop

pages:
  stage: deploy
  script:
    - cd frontend
    - echo "Checking dist directory..."
    - ls -la dist/ || echo "dist directory not found"
    - echo "Creating public directory..."
    - mkdir -p ../public
    - echo "Copying files..."
    - |
      if [ -d "dist" ] && [ "$(ls -A dist)" ]; then
        cp -r dist/* ../public/
        echo "Files copied successfully"
      else
        echo "ERROR: dist directory is empty or missing"
        exit 1
      fi
    - echo "Final public directory contents:"
    - ls -la ../public/
  artifacts:
    paths:
      - public
  only:
    - main
  dependencies:
    - build


# Build and push backend image to AWS ECR
backend_ecr_build_push:
  stage: build
  image: docker:24.0.5
  services:
    - docker:24.0.5-dind
  variables:
    DOCKER_TLS_CERTDIR: ""
    IMAGE_TAG: ${CI_COMMIT_SHORT_SHA}
  before_script:
    - apk add --no-cache python3 py3-pip bash curl jq git
    - pip install --no-cache-dir awscli
    - aws --version
    - |
      if [ -n "$AWS_ACCOUNT_ID" ] && [ -n "$AWS_DEFAULT_REGION" ] && [ -n "$AWS_ACCESS_KEY_ID" ] && [ -n "$AWS_SECRET_ACCESS_KEY" ]; then
        export ECR_REPO_NAME="${ECR_REPO_NAME:-safehavenconnect-backend}"
        echo "Logging in to ECR..."
        aws ecr describe-repositories --repository-names "$ECR_REPO_NAME" >/dev/null 2>&1 || aws ecr create-repository --repository-name "$ECR_REPO_NAME"
        aws ecr get-login-password --region "$AWS_DEFAULT_REGION" | docker login --username AWS --password-stdin "$AWS_ACCOUNT_ID.dkr.ecr.$AWS_DEFAULT_REGION.amazonaws.com"
      else
        echo "AWS credentials missing; skipping ECR login"
      fi
    - export ECR_REPO_NAME="${ECR_REPO_NAME:-safehavenconnect-backend}"
    - echo "Logging in to ECR..."
    - >
      aws ecr describe-repositories --repository-names "$ECR_REPO_NAME" >/dev/null 2>&1 ||
      aws ecr create-repository --repository-name "$ECR_REPO_NAME"
    - aws ecr get-login-password --region "$AWS_DEFAULT_REGION" | docker login --username AWS --password-stdin "$AWS_ACCOUNT_ID.dkr.ecr.$AWS_DEFAULT_REGION.amazonaws.com"
  script:
    - |
      if [ -z "$AWS_ACCOUNT_ID" ] || [ -z "$AWS_DEFAULT_REGION" ] || [ -z "$AWS_ACCESS_KEY_ID" ] || [ -z "$AWS_SECRET_ACCESS_KEY" ]; then
        echo "Skipping backend image build: required AWS credentials are not set."
        exit 0
      fi
    - echo "Building backend image..."
    - docker build -t "$ECR_REPO_NAME:$IMAGE_TAG" -f backend/Dockerfile backend
    - docker tag "$ECR_REPO_NAME:$IMAGE_TAG" "$AWS_ACCOUNT_ID.dkr.ecr.$AWS_DEFAULT_REGION.amazonaws.com/$ECR_REPO_NAME:$IMAGE_TAG"
    - docker push "$AWS_ACCOUNT_ID.dkr.ecr.$AWS_DEFAULT_REGION.amazonaws.com/$ECR_REPO_NAME:$IMAGE_TAG"
    - |
      if [ "$CI_COMMIT_BRANCH" = "main" ]; then
        docker tag "$ECR_REPO_NAME:$IMAGE_TAG" "$AWS_ACCOUNT_ID.dkr.ecr.$AWS_DEFAULT_REGION.amazonaws.com/$ECR_REPO_NAME:latest"
        docker push "$AWS_ACCOUNT_ID.dkr.ecr.$AWS_DEFAULT_REGION.amazonaws.com/$ECR_REPO_NAME:latest"
      fi
  only:
    - main
    - develop

# Deploy backend to EC2 via SSH
backend_deploy_ec2:
  stage: deploy
  image: alpine:latest
  before_script:
    - apk add --no-cache openssh-client rsync busybox-extras
    - mkdir -p ~/.ssh
    - echo "$EC2_SSH_PRIVATE_KEY" > ~/.ssh/id_rsa
    - chmod 600 ~/.ssh/id_rsa
    - echo "$EC2_HOST_IP" > /tmp/ec2_host
  script:
    - |
      EC2_HOST=$(cat /tmp/ec2_host)
      
      # Preflight check: verify EC2 is reachable on port 22
      echo "Checking SSH connectivity to $EC2_HOST..."
      if ! nc -z -w 10 "$EC2_HOST" 22; then
        echo "ERROR: Cannot reach $EC2_HOST on port 22"
        echo "Please check:"
        echo "  1. EC2 instance is running"
        echo "  2. Security Group allows inbound SSH from GitLab runner IPs"
        echo "  3. EC2 has a public IP address"
        echo "  4. EC2_HOST_IP variable is set correctly"
        exit 1
      fi
      echo "SSH port is reachable, proceeding with deployment..."
      
      # Copy backend files to EC2
      ssh -o StrictHostKeyChecking=no -o ConnectTimeout=30 ubuntu@$EC2_HOST "mkdir -p ~/app/backend"
      rsync -avz --delete ./backend/ ubuntu@$EC2_HOST:~/app/backend/
      
      # Install dependencies and restart service
      ssh -o StrictHostKeyChecking=no -o ConnectTimeout=30 ubuntu@$EC2_HOST << 'ENDSSH'
        cd ~/app/backend
        source venv/bin/activate || python3 -m venv venv && source venv/bin/activate
        pip install -r requirements.txt
        sudo systemctl restart safehavenconnect
      ENDSSH
  only:
    - main
  needs:
    - build
  when: on_success  # change to on_success for automatic deploy

