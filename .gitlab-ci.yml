stages:
  - test
  - build
  - deploy

variables:
  NODE_VERSION: "20"

cache:
  paths:
    - node_modules/

test:
  stage: test
  image: node:$NODE_VERSION
  before_script:
    - cd frontend
    - npm ci
  script:
    - npm run lint
    - npm run build
    - cd ..
    - make status
  artifacts:
    paths:
      - frontend/dist/
    expire_in: 1 hour

build:
  stage: build
  image: node:$NODE_VERSION
  before_script:
    - cd frontend
    - npm ci
  script:
    - npm run build
  artifacts:
    paths:
      - frontend/dist/
    expire_in: 1 week
  only:
    - main
    - develop

pages:
  stage: deploy
  script:
    - cd frontend
    - echo "Checking dist directory..."
    - ls -la dist/ || echo "dist directory not found"
    - echo "Creating public directory..."
    - mkdir -p ../public
    - echo "Copying files..."
    - |
      if [ -d "dist" ] && [ "$(ls -A dist)" ]; then
        cp -r dist/* ../public/
        echo "Files copied successfully"
      else
        echo "ERROR: dist directory is empty or missing"
        exit 1
      fi
    - echo "Final public directory contents:"
    - ls -la ../public/
  artifacts:
    paths:
      - public
  only:
    - main
  dependencies:
    - build


# Build and push backend image to AWS ECR
backend_ecr_build_push:
  stage: build
  image: docker:24.0.5
  services:
    - docker:24.0.5-dind
  variables:
    DOCKER_TLS_CERTDIR: ""
    IMAGE_TAG: ${CI_COMMIT_SHORT_SHA}
  before_script:
    - apk add --no-cache python3 py3-pip bash curl jq git
    - pip install --no-cache-dir awscli
    - aws --version
    - |
      if [ -n "$AWS_ACCOUNT_ID" ] && [ -n "$AWS_DEFAULT_REGION" ] && [ -n "$AWS_ACCESS_KEY_ID" ] && [ -n "$AWS_SECRET_ACCESS_KEY" ]; then
        export ECR_REPO_NAME="${ECR_REPO_NAME:-safehavenconnect-backend}"
        echo "Logging in to ECR..."
        aws ecr describe-repositories --repository-names "$ECR_REPO_NAME" >/dev/null 2>&1 || aws ecr create-repository --repository-name "$ECR_REPO_NAME"
        aws ecr get-login-password --region "$AWS_DEFAULT_REGION" | docker login --username AWS --password-stdin "$AWS_ACCOUNT_ID.dkr.ecr.$AWS_DEFAULT_REGION.amazonaws.com"
      else
        echo "AWS credentials missing; skipping ECR login"
      fi
    - export ECR_REPO_NAME="${ECR_REPO_NAME:-safehavenconnect-backend}"
    - echo "Logging in to ECR..."
    - >
      aws ecr describe-repositories --repository-names "$ECR_REPO_NAME" >/dev/null 2>&1 ||
      aws ecr create-repository --repository-name "$ECR_REPO_NAME"
    - aws ecr get-login-password --region "$AWS_DEFAULT_REGION" | docker login --username AWS --password-stdin "$AWS_ACCOUNT_ID.dkr.ecr.$AWS_DEFAULT_REGION.amazonaws.com"
  script:
    - |
      if [ -z "$AWS_ACCOUNT_ID" ] || [ -z "$AWS_DEFAULT_REGION" ] || [ -z "$AWS_ACCESS_KEY_ID" ] || [ -z "$AWS_SECRET_ACCESS_KEY" ]; then
        echo "Skipping backend image build: required AWS credentials are not set."
        exit 0
      fi
    - echo "Building backend image..."
    - docker build -t "$ECR_REPO_NAME:$IMAGE_TAG" -f backend/Dockerfile backend
    - docker tag "$ECR_REPO_NAME:$IMAGE_TAG" "$AWS_ACCOUNT_ID.dkr.ecr.$AWS_DEFAULT_REGION.amazonaws.com/$ECR_REPO_NAME:$IMAGE_TAG"
    - docker push "$AWS_ACCOUNT_ID.dkr.ecr.$AWS_DEFAULT_REGION.amazonaws.com/$ECR_REPO_NAME:$IMAGE_TAG"
    - |
      if [ "$CI_COMMIT_BRANCH" = "main" ]; then
        docker tag "$ECR_REPO_NAME:$IMAGE_TAG" "$AWS_ACCOUNT_ID.dkr.ecr.$AWS_DEFAULT_REGION.amazonaws.com/$ECR_REPO_NAME:latest"
        docker push "$AWS_ACCOUNT_ID.dkr.ecr.$AWS_DEFAULT_REGION.amazonaws.com/$ECR_REPO_NAME:latest"
      fi
  only:
    - main
    - develop

# Deploy backend to EC2 via Docker
backend_deploy_ec2:
  stage: deploy
  image: alpine:latest
  variables:
    IMAGE_TAG: ${CI_COMMIT_SHORT_SHA}
  before_script:
    - apk add --no-cache openssh-client
    - mkdir -p ~/.ssh
    - echo "$EC2_SSH_PRIVATE_KEY" > ~/.ssh/id_rsa
    - chmod 600 ~/.ssh/id_rsa
    - ssh-keyscan -H ${EC2_HOST_IP} >> ~/.ssh/known_hosts 2>/dev/null || true
  script:
    - |
      echo "Deploying backend Docker container to EC2..."
      
      # Define variables for readability
      ECR_REPO_NAME="${ECR_REPO_NAME:-safehavenconnect-backend}"
      ECR_IMAGE="$AWS_ACCOUNT_ID.dkr.ecr.$AWS_DEFAULT_REGION.amazonaws.com/$ECR_REPO_NAME:$IMAGE_TAG"
      
      # Deploy via SSH
      ssh -o StrictHostKeyChecking=no ubuntu@${EC2_HOST_IP} << ENDSSH
        set -e
        echo "=== Backend Deployment Started ==="
        
        # Login to ECR
        echo "Logging into ECR..."
        aws ecr get-login-password --region $AWS_DEFAULT_REGION | sudo docker login --username AWS --password-stdin $AWS_ACCOUNT_ID.dkr.ecr.$AWS_DEFAULT_REGION.amazonaws.com
        
        # Pull latest image
        echo "Pulling image: $ECR_IMAGE"
        sudo docker pull $ECR_IMAGE
        
        # Stop and remove old container
        echo "Stopping old container..."
        sudo docker stop safehavenconnect 2>/dev/null || true
        sudo docker rm safehavenconnect 2>/dev/null || true
        
        # Start new container
        echo "Starting new container..."
        sudo docker run -d \\
          --name safehavenconnect \\
          --env-file ~/cs373-fall-2025-55085_03/backend/.env \\
          -p 80:5000 \\
          --restart unless-stopped \\
          $ECR_IMAGE
        
        # Wait for container to be healthy
        echo "Waiting for container to start..."
        sleep 5
        
        # Check container status
        if sudo docker ps | grep safehavenconnect; then
          echo "✓ Container started successfully"
          sudo docker logs --tail 20 safehavenconnect
        else
          echo "✗ Container failed to start"
          sudo docker logs safehavenconnect
          exit 1
        fi
        
        # Health check
        echo "Testing API health..."
        if curl -f http://localhost/api/health; then
          echo "✓ API is healthy"
        else
          echo "✗ API health check failed"
          exit 1
        fi
        
        echo "=== Deployment Complete ==="
      ENDSSH
  only:
    - main
  needs:
    - backend_ecr_build_push
  when: on_success  # change to manual if you want to approve deploys
