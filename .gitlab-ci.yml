stages:
  - test
  - build
  - deploy

variables:
  NODE_VERSION: "20"

cache:
  paths:
    - node_modules/

test:
  stage: test
  image: node:$NODE_VERSION
  before_script:
    - cd frontend
    - npm ci
  script:
    - npm run lint
    - npm run build
    - make status
  artifacts:
    paths:
      - frontend/dist/
    expire_in: 1 hour

build:
  stage: build
  image: node:$NODE_VERSION
  before_script:
    - cd frontend
    - npm ci
  script:
    - npm run build
  artifacts:
    paths:
      - frontend/dist/
    expire_in: 1 week
  only:
    - main
    - develop

pages:
  stage: deploy
  script:
    - cd frontend
    - echo "Checking dist directory..."
    - ls -la dist/ || echo "dist directory not found"
    - echo "Creating public directory..."
    - mkdir -p public
    - echo "Copying files..."
    - |
      if [ -d "dist" ] && [ "$(ls -A dist)" ]; then
        cp -r dist/* public/
        echo "Files copied successfully"
      else
        echo "ERROR: dist directory is empty or missing"
        exit 1
      fi
    - echo "Final public directory contents:"
    - ls -la public/
  artifacts:
    paths:
      - frontend/public/
  only:
    - main
  dependencies:
    - build
